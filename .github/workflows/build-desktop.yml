name: Build Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run electron:build

      - name: Upload artifact (for debug / PR access)
        uses: actions/upload-artifact@v4
        with:
          name: MilPDF-Setup-Windows
          path: release/*.exe
          retention-days: 30

      # Force-move the rolling tag so the release always points to HEAD
      - name: Update latest-build tag
        run: |
          git tag -f latest-build
          git push -f origin latest-build

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: MilPDF — Latest Build
          body: |
            **Automated build** from the latest `main` branch.

            ### Install
            1. Download `MilPDF Setup*.exe` below
            2. Run the installer (click "More info → Run anyway" if Windows SmartScreen appears — the app is not yet code-signed)
            3. MilPDF will appear in your Start Menu and associate with .pdf files

            ---
            Built from commit ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: release/*.exe
